services:
  osticket:
    build: .
    container_name: osticket_app
    ports:
      - "127.0.0.1:${OSTICKET_WEB_PORT:-8081}:80"
    volumes:
      - ./upload:/var/www/html
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-db}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-osticket}
      MYSQL_USER: ${MYSQL_USER:-osticket_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-osticket_pass}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: osticket_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-osticket}
      MYSQL_USER: ${MYSQL_USER:-osticket_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-osticket_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${OSTICKET_DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

volumes:
  db_data:
